<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>个人信息卡片</h1>
    <div class="card">
        <img id="avatar" src="https://picsum.photos/100/100" alt="头像">
        <input type="file" id="avatarInput" accept="image/*">
        
        <div class="info">
            <label>姓名：</label>
            <input type="text" id="nameInput" value="你的名字">
        </div>
        <div class="info">
            <label>简介：</label>
            <textarea id="bioInput" rows="3">你的个人简介</textarea>
        </div>
        
        <button id="saveBtn">保存</button>
        
        <div class="preview">
            <h2 id="namePreview">你的名字</h2>
            <p id="bioPreview">你的个人简介</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
